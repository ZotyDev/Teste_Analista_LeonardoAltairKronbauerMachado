<div class="min-h-screen bg-[#F8F9FA]">
  <!-- Header -->
  <header class="bg-gradient-to-r from-[#4B2317] to-[#5D2E1E] text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-6 flex items-center gap-3">
      <i class="fa-solid fa-chart-bar text-2xl text-[#C5A059]"></i>
      <div>
        <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold tracking-tight">Painel de Vendas</h1>
        <p class="text-[#C5A059] text-sm mt-0.5">Gerenciamento de Pedidos</p>
      </div>
    </div>
  </header>

  @if (stats$ | async; as stats) {
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
      <!-- KPI Cards -->
      <section class="grid grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-5 mb-6 sm:mb-8">
        <app-kpi-card
          class="col-span-2 lg:col-span-1"
          label="Faturamento"
          [value]="stats.faturamentoTotal | brlCurrency"
          subtitle="Apenas concluídos"
          variant="gold"
        >
          <i icon class="fa-solid fa-dollar-sign text-[#C5A059]"></i>
        </app-kpi-card>

        <app-kpi-card
          label="Ticket Médio"
          [value]="stats.ticketMedio | brlCurrency"
          subtitle="Por pedido"
          variant="gold"
        >
          <i icon class="fa-solid fa-ticket text-[#C5A059]"></i>
        </app-kpi-card>

        <app-kpi-card
          label="Concluídos"
          [value]="stats.vendasConcluidas"
          [subtitle]="'de ' + stats.totalVendas + ' pedidos'"
          variant="success"
        >
          <i icon class="fa-solid fa-circle-check text-emerald-600"></i>
        </app-kpi-card>

        <app-kpi-card
          label="Pendentes"
          [value]="stats.vendasPendentes"
          subtitle="Aguardando"
          variant="warning"
        >
          <i icon class="fa-solid fa-clock text-amber-600"></i>
        </app-kpi-card>

        <app-kpi-card
          label="Cancelados"
          [value]="stats.vendasCanceladas"
          subtitle="Não faturados"
          variant="danger"
        >
          <i icon class="fa-solid fa-circle-xmark text-red-600"></i>
        </app-kpi-card>
      </section>

      <!-- Table Section -->
      <section class="bg-white rounded-2xl shadow-sm overflow-hidden ring-1 ring-slate-100">
        <app-sales-filter
          [(cliente)]="filterCliente"
          [(status)]="filterStatus"
          (filterChange)="onFilterChange()"
          (clear)="clearFilters()"
        />

        <!-- Table Header -->
        <div class="px-4 sm:px-6 py-3 border-b border-slate-100 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
          <h2 class="text-base sm:text-lg font-semibold text-[#4B2317] flex items-center gap-2">
            <i class="fa-solid fa-clipboard text-[#C5A059]"></i>
            Detalhamento de Vendas
          </h2>

          <div class="flex items-center justify-between sm:justify-end gap-3">
            <span class="text-xs sm:text-sm text-slate-400 flex items-center gap-1">
              <i class="fa-solid fa-tag"></i>
              {{ totalItems() }} registro{{ totalItems() !== 1 ? 's' : '' }}
            </span>

            <app-export-csv
              [data]="allSales()"
              [isFiltered]="isFiltered()"
            />
          </div>
        </div>

        <!-- Pagination Top -->
        <app-pagination
          class="border-b border-slate-100 bg-slate-50/30"
          [totalItems]="totalItems()"
          [currentPage]="currentPage()"
          [pageSize]="pageSize()"
          (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"
        />

        @if (sort$ | async; as sort) {
          <app-sales-table
            [sales]="paginatedSales()"
            [sort]="sort"
            (sortChange)="sortBy($event)"
            (selectSale)="selectVenda($event)"
          />
        }

        <!-- Pagination Bottom -->
        <app-pagination
          class="border-t border-slate-100 bg-slate-50/30"
          [totalItems]="totalItems()"
          [currentPage]="currentPage()"
          [pageSize]="pageSize()"
          (pageChange)="onPageChange($event)"
          (pageSizeChange)="onPageSizeChange($event)"
        />
      </section>
    </main>
  } @else {
    <!-- Loading -->
    <div class="flex flex-col items-center justify-center min-h-screen bg-[#F8F9FA]">
      <div class="w-12 h-12 rounded-full animate-spin border-4 border-[#C5A059]/30 border-t-[#C5A059]"></div>
      <p class="mt-4 text-[#4B2317] font-medium">Carregando dados de vendas...</p>
    </div>
  }

  <!-- Detail Panel -->
  @if (selectedVenda(); as venda) {
    <app-sale-detail-panel [venda]="venda" (close)="closeDetail()" />
  }
</div>
