<article
  class="
    bg-white rounded-2xl ring-1
    p-4 sm:p-5
    shadow-sm hover:shadow-md
    transition-shadow duration-200
  "
  [ngClass]="ringClass()"
>
  <header class="flex items-center gap-2.5 mb-2">
    <div class="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center" [ngClass]="iconBgClass()">
      <ng-content select="[icon]" />
    </div>
    <span class="text-xs font-semibold uppercase tracking-wide text-slate-500 truncate">
      {{ label() }}
    </span>
  </header>

  <p class="text-2xl font-bold leading-tight" [ngClass]="valueClass()">
    {{ value() }}
  </p>

  @if (subtitle()) {
    <span class="text-xs text-slate-400 mt-0.5 block">{{ subtitle() }}</span>
  }
</article>
