<div class="px-4 sm:px-6 py-4 border-b border-slate-100 bg-slate-50/50">
  <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 sm:items-center">

    <!-- Search Input -->
    <div class="flex-1 relative">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input
        type="text"
        [ngModel]="cliente()"
        (ngModelChange)="cliente.set($event); filterChange.emit()"
        placeholder="Buscar por cliente..."
        class="
          w-full pl-10 pr-4 py-2.5
          border border-slate-200 rounded-xl
          text-sm bg-white
          focus:outline-none focus:ring-2 focus:ring-[#C5A059] focus:border-transparent
          transition-shadow
        "
      />
    </div>

    <!-- Filter Actions -->
    <div class="flex gap-3 items-center">
      <!-- Status Select -->
      <div class="relative flex-1 sm:flex-none">
        <i class="fa-solid fa-filter absolute left-3 top-1/2 -translate-y-1/2 text-sm text-slate-400 pointer-events-none"></i>
        <select
          [ngModel]="status()"
          (ngModelChange)="status.set($event); filterChange.emit()"
          class="
            w-full sm:w-auto
            pl-9 pr-8 py-2.5
            border border-slate-200 rounded-xl
            text-sm bg-white
            focus:outline-none focus:ring-2 focus:ring-[#C5A059]
            appearance-none cursor-pointer
          "
        >
          <option value="">Todos os Status</option>
          <option value="Concluído">Concluído</option>
          <option value="Pendente">Pendente</option>
          <option value="Cancelado">Cancelado</option>
        </select>
        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-sm text-slate-400 pointer-events-none"></i>
      </div>

      <!-- Clear Button -->
      <button
        (click)="clear.emit()"
        [disabled]="!hasFilters"
        class="
          flex items-center gap-1.5
          px-4 py-2.5 rounded-xl
          text-sm text-slate-600 cursor-pointer
          hover:text-[#4B2317] hover:bg-slate-100
          disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:hover:text-slate-600
          transition-colors
        "
      >
        <i class="fa-solid fa-xmark"></i>
        Limpar
      </button>
    </div>
  </div>
</div>
